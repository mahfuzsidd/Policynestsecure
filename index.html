    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        logoGreen: '#008037',

                    }
                }
            }
        }

    <style>
        html { scroll-behavior: smooth; }
        .hero-gradient {
            background: linear-gradient(135deg, #008037 0%, #1D4ED8 100%);
        }
        .text-gradient {
            background: linear-gradient(to right, #008037, #1D4ED8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

        </div>

<header class="hero-gradient text-white py-24 px-6 text-center shadow-lg">
    <div class="container mx-auto">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-6">Aapka Bhavishya, Hamari Suraksha</h1>

</header>

<footer class="bg-logoGreen text-white text-center py-6">
    &copy; 2026 policynestsecure.in
